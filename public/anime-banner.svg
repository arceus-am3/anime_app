<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22060C"/>
      <stop offset="0.5" stop-color="#16040A"/>
      <stop offset="1" stop-color="#14060E"/>
    </linearGradient>
    <linearGradient id="flare" x1="0" y1="0" x2="1" y2="1">
