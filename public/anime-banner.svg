  <ellipse cx="260" cy="150" rx="280" ry="180" fill="#BE123C" fill-opacity="0.32" filter="url(#blur)"/>
  <ellipse cx="1320" cy="110" rx="260" ry="160" fill="#DC2626" fill-opacity="0.28" filter="url(#blur)"/>
  <ellipse cx="980" cy="620" rx="360" ry="200" fill="#9A3412" fill-opacity="0.28" filter="url(#blur)"/>

  <g opacity="0.3">
    <path d="M110 620C190 520 340 470 510 490C680 510 760 600 870 580" stroke="#FDA4AF" stroke-width="3"/>
    <path d="M620 100C760 70 900 110 1020 200" stroke="#FDBA74" stroke-width="3"/>
    <path d="M990 280C1140 230 1280 260 1400 350" stroke="#FCA5A5" stroke-width="3"/>
  </g>

  <g opacity="0.32">
