    <circle cx="380" cy="180" r="4" fill="#FFE4E6"/>
    <circle cx="1290" cy="250" r="5" fill="#FFE4E6"/>
    <circle cx="1160" cy="330" r="4" fill="#FFE4E6"/>
  </g>

  <text x="96" y="468" fill="url(#flare)" font-size="112" font-family="Arial, sans-serif" font-weight="700" opacity="0.16">ANIME ARENA</text>
  <text x="102" y="536" fill="#FFE4E6" font-size="34" font-family="Arial, sans-serif" font-weight="600" opacity="0.14">WATCH  READ  CHAT  TOGETHER</text>
